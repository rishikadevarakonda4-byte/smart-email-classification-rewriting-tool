services:
  - type: web
    name: smart-email-api
    env: python
    pythonVersion: 3.13.9
    plan: free
    branch: main
    rootDir: smart-email-apifinal
    buildCommand: python3 -m pip install --upgrade pip setuptools wheel && python3 -m pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GEMINI_MODEL
        value: gemini-2.5-flash